version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6739"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./src:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A core worker --loglevel=info
    volumes:
      - ./src:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis

  dashboard:
    image: mher/flower
    command: celery -A core flower
    ports:
      - "5555:5555"
    env_file:
      - .env
    depends_on:
      - redis
      - worker

volumes:
  postgres_data:
